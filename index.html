<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--verde:#00a86b;--verde-escuro:#007a4d;--amarelo:#FFD700;--azul:#003087;--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--card:#1e2d45;--borda:#2a3f5f;--texto:#e8edf5;--texto2:#8899b4;--raro:#f0c040;--repetida:#ff6b35;--falta:#ff4757;--tem:#00a86b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;overflow-x:hidden;}
header{background:linear-gradient(135deg,var(--azul) 0%,#001a5c 50%,var(--verde-escuro) 100%);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.02) 20px,rgba(255,255,255,.02) 21px);}
.header-inner{position:relative;display:flex;align-items:center;justify-content:space-between;padding:20px 24px;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:52px;height:52px;background:var(--amarelo);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(255,215,0,.4);}
.logo-text h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff;line-height:1;}
.logo-text span{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase;}
.header-stats{display:flex;gap:12px;flex-wrap:wrap;}
.hstat{text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 14px;min-width:75px;}
.hstat-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--amarelo);line-height:1;}
.hstat-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;}
.progress-section{background:var(--bg2);border-bottom:1px solid var(--borda);padding:14px 24px;}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-size:12px;color:var(--texto2);letter-spacing:1px;text-transform:uppercase;}
.progress-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amarelo);}
.progress-bar-bg{height:10px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--verde),var(--amarelo));border-radius:99px;transition:width .6s;}
nav{background:var(--bg2);border-bottom:1px solid var(--borda);padding:0 16px;display:flex;overflow-x:auto;}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--texto2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:14px 16px;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-btn.ativo{color:var(--amarelo);border-bottom-color:var(--amarelo);}
main{padding:20px;max-width:1400px;margin:0 auto;}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:10px 14px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.search-box:focus{border-color:var(--verde);}
.search-box::placeholder{color:var(--texto2);}
select.filtro{background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:10px 12px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer;}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;padding:10px 16px;transition:all .2s;}
.btn-primary{background:var(--verde);color:#fff;}
.btn-secondary{background:var(--bg3);color:var(--texto);border:1px solid var(--borda);}
.btn-danger{background:#c0392b;color:#fff;}
.secao-header{display:flex;align-items:center;gap:10px;margin:24px 0 12px;}
.secao-titulo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.secao-badge{font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--borda);border-radius:99px;padding:3px 10px;color:var(--texto2);}
.secao-prog{flex:1;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.secao-prog-fill{height:100%;background:var(--verde);border-radius:99px;transition:width .4s;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:8px;}
.figurinha{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:10px 8px 8px;text-align:center;transition:all .18s;position:relative;user-select:none;}
.figurinha:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.figurinha.tem{border-color:var(--tem);background:rgba(0,168,107,.08);}
.figurinha.repetida{border-color:var(--repetida);background:rgba(255,107,53,.08);}
.figurinha.rara{border-color:var(--raro);background:rgba(240,192,64,.07);}
.figurinha.rara.tem{background:rgba(240,192,64,.15);}
.fig-codigo{font-family:'DM Mono',monospace;font-size:10px;color:var(--texto2);margin-bottom:4px;}
.fig-nome{font-size:10px;font-weight:500;color:var(--texto);line-height:1.3;margin-bottom:6px;min-height:26px;display:flex;align-items:center;justify-content:center;}
.fig-estrela{position:absolute;top:5px;right:6px;font-size:11px;}
.fig-controles{display:flex;align-items:center;justify-content:center;gap:6px;}
.fig-btn{width:22px;height:22px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;}
.fig-btn-menos{background:rgba(255,71,87,.2);color:var(--falta);}
.fig-btn-mais{background:rgba(0,168,107,.2);color:var(--tem);}
.fig-qty{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:18px;line-height:1;}
.fig-qty.zero{color:var(--texto2);opacity:.4;}
.fig-qty.qrep{color:var(--repetida);}
.fig-qty.qrara{color:var(--raro);}
.status-badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:4px;padding:2px 5px;margin-bottom:3px;}
.badge-falta{background:rgba(255,71,87,.2);color:var(--falta);}
.badge-tem{background:rgba(0,168,107,.2);color:var(--tem);}
.badge-rep{background:rgba(255,107,53,.25);color:var(--repetida);}
.troca-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:18px;margin-bottom:12px;}
.troca-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.troca-nome{font-weight:600;font-size:15px;}
.troca-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:99px;padding:4px 12px;}
.status-pendente{background:rgba(255,215,0,.15);color:var(--amarelo);}
.status-concluida{background:rgba(0,168,107,.15);color:var(--tem);}
.troca-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.troca-col-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--texto2);margin-bottom:6px;font-weight:600;}
.troca-tags{display:flex;flex-wrap:wrap;gap:5px;}
.troca-tag{background:var(--bg3);border:1px solid var(--borda);border-radius:6px;padding:3px 8px;font-size:11px;font-family:'DM Mono',monospace;}
.troca-acoes{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.aberto{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--borda);border-radius:18px;padding:24px;width:92%;max-width:480px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:16px;}
.campo{margin-bottom:12px;}
.campo label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--texto2);margin-bottom:5px;font-weight:600;}
.campo input,.campo textarea{width:100%;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:10px 12px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.campo textarea{resize:vertical;min-height:70px;}
.modal-acoes{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.secao-oculta{display:none;}
.export-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.lista-chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--bg3);border:1px solid var(--borda);border-radius:8px;padding:4px 10px;font-size:12px;font-family:'DM Mono',monospace;}
.chip.rara{border-color:var(--raro);color:var(--raro);}
.chip.repetida{border-color:var(--repetida);color:var(--repetida);}
.empty{text-align:center;padding:50px 20px;color:var(--texto2);}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.5;}
.empty p{font-size:14px;}
.toast{position:fixed;bottom:24px;right:20px;background:var(--verde);color:#fff;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
.toast.show{transform:none;opacity:1;}
.toast.erro{background:var(--falta);}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--verde);margin-left:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">&#127942;</div>
      <div class="logo-text">
        <h1>Album Copa 2026</h1>
        <span>Colecao Compartilhada <span class="sync-dot"></span></span>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num" id="stat-coladas">0</div><div class="hstat-label">Coladas</div></div>
      <div class="hstat"><div class="hstat-num" id="stat-faltam">980</div><div class="hstat-label">Faltam</div></div>
      <div class="hstat"><div class="hstat-num" id="stat-repetidas">0</div><div class="hstat-label">Repetidas</div></div>
    </div>
  </div>
</header>
<div class="progress-section">
  <div class="progress-header">
    <span class="progress-label">Progresso do Album</span>
    <span class="progress-pct" id="pct">0%</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
</div>
<nav>
  <button class="nav-btn ativo" id="nav-colecao" onclick="mostrarAba('colecao')">&#128218; Colecao</button>
  <button class="nav-btn" id="nav-faltas" onclick="mostrarAba('faltas')">&#10060; Faltas</button>
  <button class="nav-btn" id="nav-repetidas" onclick="mostrarAba('repetidas')">&#128260; Repetidas</button>
  <button class="nav-btn" id="nav-trocas" onclick="mostrarAba('trocas')">&#129309; Trocas</button>
</nav>
<main>
  <div id="aba-colecao">
    <div class="toolbar">
      <input type="text" class="search-box" placeholder="Buscar figurinha..." id="busca" oninput="renderColecao()">
      <select class="filtro" id="filtroSecao" onchange="renderColecao()"><option value="">Todas as secoes</option></select>
      <select class="filtro" id="filtroStatus" onchange="renderColecao()">
        <option value="">Todos os status</option>
        <option value="falta">Faltam</option>
        <option value="tem">Tenho</option>
        <option value="repetida">Repetidas</option>
        <option value="rara">Especiais</option>
      </select>
    </div>
    <div id="colecaoContainer"></div>
  </div>
  <div id="aba-faltas" class="secao-oculta">
    <div class="export-row">
      <button class="btn btn-secondary" onclick="exportarFaltas()">Copiar lista</button>
      <button class="btn btn-secondary" onclick="exportarFaltasTxt()">Baixar .txt</button>
    </div>
    <div id="faltasContainer"></div>
  </div>
  <div id="aba-repetidas" class="secao-oculta">
    <div class="export-row">
      <button class="btn btn-secondary" onclick="exportarRepetidas()">Copiar lista</button>
    </div>
    <div id="repetidasContainer"></div>
  </div>
  <div id="aba-trocas" class="secao-oculta">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="abrirModalTroca()">+ Nova Troca</button>
    </div>
    <div id="trocasContainer"></div>
  </div>
</main>
<div class="modal-overlay" id="modalTroca">
  <div class="modal">
    <h3>Nova Troca</h3>
    <div class="campo"><label>Nome / Contato</label><input type="text" id="troca-nome" placeholder="ex: Joao"></div>
    <div class="campo"><label>Figurinhas que vou DAR (codigos separados por virgula)</label><input type="text" id="troca-dou" placeholder="ex: BRA-03, ARG-07"></div>
    <div class="campo"><label>Figurinhas que vou RECEBER</label><input type="text" id="troca-recebo" placeholder="ex: BRA-12, FRA-02"></div>
    <div class="campo"><label>Observacoes</label><textarea id="troca-obs"></textarea></div>
    <div class="modal-acoes">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarTroca()">Salvar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function atualizarStats() {
  var col = FIGURINHAS_BASE.filter(function(f){ return (qtys[f.codigo]||0) >= 1; }).length;
  var rep = FIGURINHAS_BASE.reduce(function(s,f){ return s + Math.max(0,(qtys[f.codigo]||0)-1); }, 0);
  document.getElementById('stat-coladas').textContent = col;
  document.getElementById('stat-faltam').textContent = Math.max(0, 980 - col);
  document.getElementById('stat-repetidas').textContent = rep;
  var pct = Math.round(col / 980 * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = Math.min(100,pct) + '%';
}

function renderAtual() {
  if (abaAtual === 'colecao') renderColecao();
  else if (abaAtual === 'faltas') renderFaltas();
  else if (abaAtual === 'repetidas') renderRepetidas();
}

function getSecoes() {
  var s = {};
  FIGURINHAS_BASE.forEach(function(f){ s[f.secao] = true; });
  return Object.keys(s).sort();
}

function atualizarFiltroSecao() {
  var sel = document.getElementById('filtroSecao');
  var val = sel.value;
  var opts = '<option value="">Todas as secoes</option>';
  getSecoes().forEach(function(s){ opts += '<option value="' + s + '"' + (s===val?' selected':'') + '>' + s + '</option>'; });
  sel.innerHTML = opts;
}

function renderColecao() {
  atualizarFiltroSecao();
  var busca = document.getElementById('busca').value.toLowerCase();
  var filtSecao = document.getElementById('filtroSecao').value;
  var filtStatus = document.getElementById('filtroStatus').value;

  var figs = FIGURINHAS_BASE.filter(function(f) {
    var qty = qtys[f.codigo] || 0;
    var mb = !busca || f.codigo.toLowerCase().indexOf(busca)>=0 || f.nome.toLowerCase().indexOf(busca)>=0 || f.secao.toLowerCase().indexOf(busca)>=0;
    var ms = !filtSecao || f.secao === filtSecao;
    var mst = !filtStatus || (filtStatus==='falta'?qty===0:filtStatus==='tem'?qty>=1:filtStatus==='repetida'?qty>=2:filtStatus==='rara'?f.especial==='true':true);
    return mb && ms && mst;
  });

  var container = document.getElementById('colecaoContainer');
  if (figs.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">&#128269;</div><p>Nenhuma figurinha encontrada.</p></div>';
    return;
  }

  var porSecao = {};
  figs.forEach(function(f){ if(!porSecao[f.secao]) porSecao[f.secao]=[]; porSecao[f.secao].push(f); });

  var html = '';
  Object.keys(porSecao).sort().forEach(function(sec) {
    var arr = porSecao[sec];
    var tem = arr.filter(function(f){ return (qtys[f.codigo]||0)>=1; }).length;
    var pct = Math.round(tem/arr.length*100);
    html += '<div class="secao-header"><span class="secao-titulo">' + sec + '</span><span class="secao-badge">' + tem + '/' + arr.length + '</span><div class="secao-prog"><div class="secao-prog-fill" style="width:' + pct + '%"></div></div></div>';
    html += '<div class="grid">';
    arr.sort(function(a,b){ return a.codigo.localeCompare(b.codigo); }).forEach(function(f){ html += renderFiguinha(f); });
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderFiguinha(f) {
  var qty = qtys[f.codigo] || 0;
  var rara = f.especial === 'true';
  var cls = (rara ? 'rara ' : '') + (qty>=2 ? 'repetida' : qty===1 ? 'tem' : '');
  var badge = qty===0 ? '<span class="status-badge badge-falta">FALTA</span>' :
    qty>=2 ? '<span class="status-badge badge-rep">+' + (qty-1) + ' REP</span>' :
    '<span class="status-badge badge-tem">TEM</span>';
  var qcls = qty===0?'zero':qty>=2?'qrep':rara?'qrara':'';
  return '<div class="figurinha ' + cls + '">' +
    (rara ? '<span class="fig-estrela">&#11088;</span>' : '') +
    '<div class="fig-codigo">' + f.codigo + '</div>' +
    badge +
    '<div class="fig-nome">' + f.nome + '</div>' +
    '<div class="fig-controles">' +
    '<button class="fig-btn fig-btn-menos" onclick="alterarQty('' + f.codigo + '',-1)">&#8722;</button>' +
    '<span class="fig-qty ' + qcls + '">' + qty + '</span>' +
    '<button class="fig-btn fig-btn-mais" onclick="alterarQty('' + f.codigo + '',1)">+</button>' +
    '</div></div>';
}

function alterarQty(cod, delta) {
  var novo = Math.max(0, (qtys[cod]||0) + delta);
  qtys[cod] = novo;
  db.ref('album/qtys/' + cod).set(novo);
  atualizarStats();
  renderAtual();
}

function renderFaltas() {
  var faltam = FIGURINHAS_BASE.filter(function(f){ return (qtys[f.codigo]||0)===0; });
  var container = document.getElementById('faltasContainer');
  if (faltam.length===0) { container.innerHTML='<div class="empty"><div class="empty-icon">&#127881;</div><p>Album completo!</p></div>'; return; }
  var porSecao = {};
  faltam.forEach(function(f){ if(!porSecao[f.secao]) porSecao[f.secao]=[]; porSecao[f.secao].push(f); });
  var html = '<p style="color:var(--texto2);font-size:14px;margin-bottom:14px;">Faltando: <strong style="color:var(--falta)">' + faltam.length + '</strong> figurinhas</p>';
  Object.keys(porSecao).sort().forEach(function(sec) {
    html += '<div class="secao-header"><span class="secao-titulo">' + sec + '</span><span class="secao-badge">' + porSecao[sec].length + '</span></div>';
    html += '<div class="lista-chips" style="margin-bottom:14px;">';
    porSecao[sec].forEach(function(f){
      html += '<span class="chip' + (f.especial==='true'?' rara':'') + '" title="' + f.nome + '">' + f.codigo + '</span>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function exportarFaltas() {
  var txt = FIGURINHAS_BASE.filter(function(f){return (qtys[f.codigo]||0)===0;}).map(function(f){return f.codigo+' - '+f.nome;}).join('\n');
  navigator.clipboard.writeText(txt).then(function(){ toast('Lista copiada!'); });
}

function exportarFaltasTxt() {
  var txt = 'FALTAM - Copa 2026\n\n' + FIGURINHAS_BASE.filter(function(f){return (qtys[f.codigo]||0)===0;}).map(function(f){return f.codigo+' - '+f.nome;}).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download = 'faltas_copa2026.txt'; a.click();
}

function renderRepetidas() {
  var rep = FIGURINHAS_BASE.filter(function(f){ return (qtys[f.codigo]||0)>=2; });
  var container = document.getElementById('repetidasContainer');
  if (rep.length===0) { container.innerHTML='<div class="empty"><div class="empty-icon">&#128260;</div><p>Nenhuma repetida ainda.</p></div>'; return; }
  var porSecao = {};
  rep.forEach(function(f){ if(!porSecao[f.secao]) porSecao[f.secao]=[]; porSecao[f.secao].push(f); });
  var totalRep = rep.reduce(function(s,f){ return s+((qtys[f.codigo]||0)-1); }, 0);
  var html = '<p style="color:var(--texto2);font-size:14px;margin-bottom:14px;">Para troca: <strong style="color:var(--repetida)">' + totalRep + '</strong></p>';
  Object.keys(porSecao).sort().forEach(function(sec) {
    html += '<div class="secao-header"><span class="secao-titulo">' + sec + '</span></div>';
    html += '<div class="lista-chips" style="margin-bottom:14px;">';
    porSecao[sec].forEach(function(f){
      html += '<span class="chip repetida">' + f.codigo + ' x' + ((qtys[f.codigo]||0)-1) + '</span>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function exportarRepetidas() {
  var txt = FIGURINHAS_BASE.filter(function(f){return (qtys[f.codigo]||0)>=2;}).map(function(f){return f.codigo+' - '+f.nome+' x'+((qtys[f.codigo]||0)-1);}).join('\n');
  navigator.clipboard.writeText(txt).then(function(){ toast('Lista copiada!'); });
}

function abrirModalTroca() {
  ['troca-nome','troca-dou','troca-recebo','troca-obs'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('modalTroca').classList.add('aberto');
}

function salvarTroca() {
  var nome = document.getElementById('troca-nome').value.trim();
  if (!nome) { toast('Informe o nome/contato.', true); return; }
  var dou = document.getElementById('troca-dou').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
  var recebo = document.getElementById('troca-recebo').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
  var obs = document.getElementById('troca-obs').value.trim();
  var id = 't' + Date.now();
  db.ref('album/trocas/' + id).set({id:id,nome:nome,dou:dou,recebo:recebo,obs:obs,status:'pendente',criado:Date.now()});
  fecharModal();
  toast('Troca registrada!');
}

function concluirTroca(id) {
  var t = trocas[id]; if (!t) return;
  (t.dou||[]).forEach(function(cod){ db.ref('album/qtys/'+cod).set(Math.max(0,(qtys[cod]||0)-1)); });
  (t.recebo||[]).forEach(function(cod){ db.ref('album/qtys/'+cod).set((qtys[cod]||0)+1); });
  db.ref('album/trocas/'+id+'/status').set('concluida');
  toast('Troca concluida!');
}

function excluirTroca(id) {
  if (!confirm('Excluir esta troca?')) return;
  db.ref('album/trocas/'+id).remove();
  toast('Troca excluida.');
}

function renderTrocas() {
  var container = document.getElementById('trocasContainer');
  var lista = Object.values(trocas).sort(function(a,b){ return b.criado-a.criado; });
  if (lista.length===0) { container.innerHTML='<div class="empty"><div class="empty-icon">&#129309;</div><p>Nenhuma troca registrada.</p></div>'; return; }
  var html = '';
  lista.forEach(function(t) {
    var dou = (t.dou||[]).map(function(c){ return '<span class="troca-tag">'+c+'</span>'; }).join('');
    var rec = (t.recebo||[]).map(function(c){ return '<span class="troca-tag">'+c+'</span>'; }).join('');
    html += '<div class="troca-card">' +
      '<div class="troca-header"><span class="troca-nome">'+t.nome+'</span>' +
      '<span class="troca-status status-'+t.status+'">'+(t.status==='pendente'?'Pendente':'Concluida')+'</span></div>' +
      '<div class="troca-cols">' +
      '<div><div class="troca-col-label">Estou dando</div><div class="troca-tags">'+dou+'</div></div>' +
      '<div><div class="troca-col-label">Vou receber</div><div class="troca-tags">'+rec+'</div></div>' +
      '</div>' +
      (t.obs?'<p style="color:var(--texto2);font-size:13px;margin-top:10px;">'+t.obs+'</p>':'') +
      '<div class="troca-acoes">';
    if (t.status==='pendente') {
      html += '<button class="btn btn-primary" onclick="concluirTroca(\'' + t.id + '\')">Concluir</button>';
    }
    html += '<button class="btn btn-danger" onclick="excluirTroca(\'' + t.id + '\')">Excluir</button>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function mostrarAba(aba) {
  abaAtual = aba;
  ['colecao','faltas','repetidas','trocas'].forEach(function(a) {
    document.getElementById('aba-'+a).classList.toggle('secao-oculta', a!==aba);
    document.getElementById('nav-'+a).classList.toggle('ativo', a===aba);
  });
  renderAtual();
  if (aba==='trocas') renderTrocas();
}

function fecharModal() { document.getElementById('modalTroca').classList.remove('aberto'); }

document.getElementById('modalTroca').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});

function toast(msg, erro) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('erro', !!erro);
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

atualizarStats();
renderColecao();
</script>
</body>
</html>
